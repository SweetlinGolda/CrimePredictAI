<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Crime & Risk Analysis System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f5f6fa;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#40739e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#273c75;
}

.result{
margin-top:20px;
padding:15px;
border-radius:8px;
font-weight:bold;
}

.high{
background:#ff6b6b;
color:white;
}

.medium{
background:#feca57;
}

.low{
background:#1dd1a1;
color:white;
}

.insight{
margin-top:10px;
padding:10px;
background:#ecf0f1;
border-radius:6px;
}

.chartBox{
margin-top:30px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Crime & Risk Analysis System</h1>

<div class="input-group">
<label>Location</label>
<select id="cityInput">
<option value="">Select City</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Chennai</option>
<option>Bangalore</option>
</select>
</div>

<div class="input-group">
<label>Time of Occurrence</label>
<select id="timeInput">
<option value="">Select Time</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
<option>Night</option>
</select>
</div>

<div class="input-group">
<label>Victim Age</label>
<input type="number" id="ageInput">
</div>

<div class="input-group">
<label>Victim Gender</label>
<select id="genderInput">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Weapon Used</label>
<select id="weaponInput">
<option value="">Select Weapon</option>
<option>None</option>
<option>Knife</option>
<option>Firearm</option>
<option>Blunt Object</option>
<option>Poison</option>
<option>Explosives</option>
<option>Other</option>
</select>
</div>

<div class="input-group">
<label>Police Deployed</label>
<input type="number" id="policeInput">
</div>

<button onclick="predictCrime()">Predict Crime Risk</button>

<div id="crimeResult" class="result"></div>

<div id="aiInsight" class="insight"></div>

<div class="chartBox">
<canvas id="crimeChart"></canvas>
</div>

</div>

<script>

let chart;

async function predictCrime(){

const weapon=document.getElementById("weaponInput").value;
const age=parseInt(document.getElementById("ageInput").value);
const time=document.getElementById("timeInput").value;
const police=parseInt(document.getElementById("policeInput").value)||0;
const city=document.getElementById("cityInput").value;
const gender=document.getElementById("genderInput").value;

if(!weapon || !age || !time || !city){
alert("Please fill all required fields");
return;
}

const response = await fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
city:city,
time:time,
age:age,
gender:gender,
weapon:weapon,
police:police
})
});

const data = await response.json();

let predictedCrime = data.crime;

/* Risk Score */

let riskScore=0;

if(weapon==="Firearm") riskScore+=40;
else if(weapon==="Knife") riskScore+=30;
else if(weapon==="Blunt Object") riskScore+=25;
else if(weapon==="Poison") riskScore+=35;
else if(weapon==="Explosives") riskScore+=50;
else riskScore+=10;

if(time==="Night") riskScore+=25;
else if(time==="Evening") riskScore+=15;
else riskScore+=5;

if(age<25) riskScore+=10;

if(police<5) riskScore+=20;
else if(police<10) riskScore+=10;
else riskScore-=5;

/* Risk Level */

let riskLevel="Low";

if(riskScore>70) riskLevel="High";
else if(riskScore>40) riskLevel="Medium";

/* Accuracy */

let accuracy = Math.min(95, Math.max(65, 60 + riskScore/2));
accuracy = accuracy.toFixed(1);

const resultDiv=document.getElementById("crimeResult");

resultDiv.innerHTML=
"Predicted Crime: "+predictedCrime+
"<br>Risk Level: "+riskLevel+
"<br>Model Accuracy: "+accuracy+"%";

if(riskLevel==="High") resultDiv.className="result high";
else if(riskLevel==="Medium") resultDiv.className="result medium";
else resultDiv.className="result low";

/* Chart */

const ctx=document.getElementById('crimeChart');

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:['Risk Score','Model Accuracy'],
datasets:[{
label:'Crime Analysis',
data:[riskScore,accuracy],
borderWidth:5
}]
}
});

}

</script>

</body>
</html>
